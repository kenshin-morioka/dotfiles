name: Auto-assign Issue

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue to kenshin-morioka
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: gh issue edit "$ISSUE_URL" --add-assignee kenshin-morioka
